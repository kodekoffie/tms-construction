const API = {
  getUrl() { return localStorage.getItem("tms_api_url") || ""; },
  setUrl(url) { localStorage.setItem("tms_api_url", url); },
  isConfigured() { return !!this.getUrl(); },
  async getData() {
    const url = this.getUrl();
    if (!url) { try { return JSON.parse(localStorage.getItem("tms_data") || "null"); } catch { return null; } }
    try { const r = await fetch(url + "?action=getData"); const d = await r.json(); return (d && Object.keys(d).length > 0) ? d : null; } catch (e) { console.error("getData:", e); return null; }
  },
  async saveData(data) {
    const url = this.getUrl();
    if (!url) { localStorage.setItem("tms_data", JSON.stringify(data)); return; }
    try { await fetch(url, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ action: "saveData", data }) }); } catch (e) { console.error("saveData:", e); throw e; }
  },
  async uploadPhoto(base64, filename) {
    const url = this.getUrl();
    if (!url) return { url: base64, isBase64: true };
    try {
      const r = await fetch(url, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ action: "uploadPhoto", base64, filename, mimeType: "image/jpeg" }) });
      const d = await r.json();
      if (d && d.url) return { url: d.url, isBase64: false };
      console.error("Upload returned no URL:", d);
      return { url: base64, isBase64: true };
    } catch (e) { console.error("Upload failed:", e); return { url: base64, isBase64: true }; }
  },
  async ping() {
    const url = this.getUrl();
    if (!url) return { ok: false, msg: "No API URL configured" };
    try { const r = await fetch(url + "?action=ping"); const d = await r.json(); return { ok: d.ok, msg: "Connected" }; } catch (e) { return { ok: false, msg: e.message }; }
  }
};

const compressImage=(file,maxW=800,quality=0.6)=>new Promise(resolve=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement("canvas");let w=img.width,h=img.height;if(w>maxW){h=(maxW/w)*h;w=maxW;}c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);const base64=c.toDataURL("image/jpeg",quality);if(typeof API!=="undefined"&&API.isConfigured()){API.uploadPhoto(base64,file.name).then(r=>resolve(r.url)).catch(()=>resolve(base64));}else{resolve(base64);}};img.src=e.target.result;};r.readAsDataURL(file);});

/* Unit ID generator: ItemName/MM/YY/Supplier/001 */
function generateUnitId(nama, supplier, existingInventory) {
  const now = new Date();
  const mm = String(now.getMonth()+1).padStart(2,"0");
  const yy = String(now.getFullYear()).slice(2);
  const prefix = `${nama}/${mm}/${yy}/${supplier||"NA"}`;
  const existing = (existingInventory||[]).filter(it => (it.unitId||"").startsWith(prefix));
  const num = String(existing.length + 1).padStart(3,"0");
  return `${prefix}/${num}`;
}

function PhotoUpload({photos=[],onChange,max=5}){const fr=useRef(null);const handleFiles=async e=>{const files=Array.from(e.target.files||[]);const np=[];for(const f of files.slice(0,max-photos.length)){const data=await compressImage(f,600,.5);np.push({id:uid(),data,name:f.name,date:nowISO()});}onChange([...photos,...np]);if(fr.current)fr.current.value="";};return <div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{photos.map(p=><div key={p.id} style={{position:"relative",width:72,height:72,borderRadius:6,overflow:"hidden",border:`1px solid ${C.b1}`}}><img src={p.data} style={{width:"100%",height:"100%",objectFit:"cover"}}/><button onClick={()=>onChange(photos.filter(x=>x.id!==p.id))} style={{position:"absolute",top:2,right:2,background:"rgba(0,0,0,.7)",color:"#fff",border:"none",borderRadius:4,width:18,height:18,fontSize:10,cursor:"pointer",lineHeight:1}}>×</button></div>)}{photos.length<max&&<div onClick={()=>fr.current?.click()} style={{width:72,height:72,borderRadius:6,border:`2px dashed ${C.b2}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexDirection:"column",gap:2}}><span style={{fontSize:20,color:C.t3,lineHeight:1}}>+</span><span style={{fontSize:9,color:C.t3}}>Foto</span></div>}</div><input ref={fr} type="file" accept="image/*" multiple style={{display:"none"}} onChange={handleFiles}/></div>;}

function PhotoGallery({photos=[],small=false}){const [v,setV]=useState(null);if(!photos.length)return null;return <><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{photos.map((p,i)=><div key={p.id||i} onClick={()=>setV(p)} style={{width:small?40:56,height:small?40:56,borderRadius:4,overflow:"hidden",cursor:"pointer",border:`1px solid ${C.b1}`}}><img src={p.data} style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>)}</div>{v&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1001,padding:20}} onClick={()=>setV(null)}><div style={{maxWidth:"90vw",maxHeight:"85vh"}}><img src={v.data} style={{maxWidth:"100%",maxHeight:"80vh",borderRadius:8}}/><div style={{textAlign:"center",color:C.t3,fontSize:11,marginTop:8}}>{v.name||""} — {fmtDate(v.date)}</div></div></div>}</>;};

function calcProject(p){const phases=p.phases||[],tasks=phases.flatMap(ph=>ph.tasks||[]);const tm2=tasks.reduce((s,t)=>s+(t.targetM2||0),0),dm2=tasks.reduce((s,t)=>s+(t.selesaiM2||0),0);const pct=tm2>0?Math.round((dm2/tm2)*100):0;const hasDates=p.mulai&&p.targetSelesai;const totalDays=hasDates?Math.max(1,diffDays(p.mulai,p.targetSelesai)):0;const elapsed=hasDates?Math.max(0,diffDays(p.mulai,today())):0;const timePct=totalDays>0?clamp(Math.round((elapsed/totalDays)*100),0,100):0;const status=pct>=100?"selesai":(!hasDates||pct>=timePct-15)?"on_track":"terlambat";const daysLeft=p.targetSelesai?diffDays(today(),p.targetSelesai):null;return {...p,tasks,tm2,dm2,pct,timePct,status,totalDays,elapsed,daysLeft,phaseCount:phases.length,taskCount:tasks.length};}
function calcPhase(ph){const tasks=ph.tasks||[];const tm2=tasks.reduce((s,t)=>s+(t.targetM2||0),0),dm2=tasks.reduce((s,t)=>s+(t.selesaiM2||0),0);return {...ph,tm2,dm2,pct:tm2>0?Math.round((dm2/tm2)*100):0,taskCount:tasks.length};}

function downloadCSV(filename,headers,rows){const esc=v=>`"${String(v??"").replace(/"/g,'""')}"`;const csv=[headers.map(esc).join(","),...rows.map(r=>r.map(esc).join(","))].join("\n");const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);}

const Shell=({children})=><div style={{minHeight:"100vh",background:C.bg,color:C.t1,fontFamily:F.b,fontSize:13.5,lineHeight:1.55}}><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>{children}</div>;

function App(){
  const [data,setData]=useState(null);const [role,setRole]=useState(null);const [page,setPage]=useState("dashboard");const [loading,setLoading]=useState(true);
  const [syncStatus,setSyncStatus]=useState("idle");
  const lastSaveRef=useRef(null);
  const isSavingRef=useRef(false);

  useEffect(()=>{(async()=>{try{const r=await API.getData();setData(r&&r.workers&&r.workers.length>0?r:{...INITIAL});}catch{setData({...INITIAL});}setLoading(false);})();},[]);

  // Poll for changes every 30s
  useEffect(()=>{
    if(!data)return;
    const poll=setInterval(async()=>{
      if(isSavingRef.current)return;
      try{const r=await API.getData();if(r&&Object.keys(r).length>0){const sj=JSON.stringify(r);if(sj!==lastSaveRef.current){setData(r);lastSaveRef.current=sj;}}}catch{}
    },30000);
    return()=>clearInterval(poll);
  },[data]);

  const update=useCallback(fn=>{setData(prev=>{
    const next=JSON.parse(JSON.stringify(prev));fn(next);
    const json=JSON.stringify(next);
    lastSaveRef.current=json;
    isSavingRef.current=true;
    setSyncStatus("saving");
    (async()=>{try{await API.saveData(JSON.parse(json));setSyncStatus("saved");setTimeout(()=>setSyncStatus(s=>s==="saved"?"idle":s),2000);}catch{setSyncStatus("error");}finally{isSavingRef.current=false;}})();
    return next;
  });},[]);

  const SyncBadge=()=>{if(syncStatus==="idle")return null;const cfg={saving:{bg:`${C.blue}22`,color:C.blue,text:"Menyimpan..."},saved:{bg:C.greenDim,color:C.green,text:"✓ Tersimpan"},error:{bg:C.redDim,color:C.red,text:"✗ Gagal"}}[syncStatus]||{};return <div style={{position:"fixed",bottom:12,right:12,padding:"6px 14px",borderRadius:7,fontSize:11,fontWeight:500,background:cfg.bg,color:cfg.color,zIndex:900,transition:"all .3s"}}>{cfg.text}</div>;};

  if(loading)return <Shell><div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"60vh",color:C.t3}}>Memuat...</div></Shell>;
  if(!role)return <Shell><LoginPage data={data} onLogin={r=>{setRole(r);setPage(r==="absen"?"absen":"dashboard");}}/><SyncBadge/></Shell>;
  if(role==="absen")return <Shell><AbsenTukangPage data={data} update={update} onLogout={()=>setRole(null)}/><SyncBadge/></Shell>;
  return <Shell><div style={{display:"flex",minHeight:"100vh"}}>
    <SideMenu page={page} setPage={setPage} role={role} onLogout={()=>{setRole(null);setPage("dashboard");}}/>
    <div style={{flex:1,padding:"20px 24px",maxWidth:920,overflow:"auto"}}>
      {page==="dashboard"&&<DashboardPage data={data} setPage={setPage}/>}
      {page==="proyek"&&<ProyekPage data={data} update={update} role={role}/>}
      {page==="tukang"&&<TukangPage data={data} update={update} role={role}/>}
      {page==="absensi"&&<AbsensiPage data={data}/>}
      {page==="kasbon"&&<KasbonPage data={data} update={update} role={role}/>}
      {page==="houserule"&&<HouseRulePage data={data} update={update} role={role}/>}
      {page==="inventaris"&&<InventarisPage data={data} update={update}/>}
      {page==="ekspor"&&<EksporPage data={data}/>}
      {page==="approval"&&<ApprovalPage data={data} update={update}/>}
      {page==="gaji"&&<GajiPage data={data} update={update}/>}
      {page==="aturan"&&<AturanPage data={data} update={update}/>}
      <div style={{height:40}}/>
    </div>
  </div></Shell>;
}

  const go=()=>{const p=String(pin);if(mode==="manager"&&p===String(data.managerPin))return onLogin("manager");if(mode==="admin"&&p===String(data.adminPin))return onLogin("admin");if(mode==="absen"&&p===String(data.absenPin||"0000"))return onLogin("absen");setErr("PIN salah");};

function AbsenTukangPage({data,update,onLogout}){
  const [time,setTime]=useState(new Date());const [showRules,setShowRules]=useState(false);
  useEffect(()=>{const i=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(i);},[]);
  const workers=data.workers.filter(w=>w.status==="AKTIF");
  const getAtt=wid=>data.attendance.find(a=>a.tukangId===wid&&a.tanggal===today());
  const clockIn=w=>{const n=nowISO(),late=minutesLate(n);update(d=>{if(d.attendance.find(a=>a.tukangId===w.id&&a.tanggal===today()))return;d.attendance.push({id:uid(),tukangId:w.id,proyekId:w.proyekAktif||"",tanggal:today(),clockIn:n,clockOut:null,telatMenit:late,pulangAwalMenit:0,status:"hadir"});if(late>0){const rule=d.houseRules.find(r=>r.id==="hr1");const rate=rule?.denda_per||5000;d.penalties.push({id:uid(),tukangId:w.id,aturanId:"hr1",aturanNama:rule?.nama||"Telat masuk kerja",denda:late*rate,tipe:"auto",catatan:`Telat ${late} menit (${fmtRp(rate)}/mnt)`,status:"approved",tanggal:today(),approvedBy:"system"});}});};
  const clockOut=w=>{const n=nowISO(),early=minutesEarly(n);update(d=>{const a=d.attendance.find(a=>a.tukangId===w.id&&a.tanggal===today());if(!a||a.clockOut)return;a.clockOut=n;a.pulangAwalMenit=early;if(early>0){const rule=d.houseRules.find(r=>r.id==="hr2");const rate=rule?.denda_per||5000;d.penalties.push({id:uid(),tukangId:w.id,aturanId:"hr2",aturanNama:rule?.nama||"Pulang sebelum waktunya",denda:early*rate,tipe:"auto",catatan:`Pulang awal ${early} menit (${fmtRp(rate)}/mnt)`,status:"approved",tanggal:today(),approvedBy:"system"});}});};
  const markAbsent=w=>{update(d=>{if(d.attendance.find(a=>a.tukangId===w.id&&a.tanggal===today()))return;d.attendance.push({id:uid(),tukangId:w.id,proyekId:w.proyekAktif||"",tanggal:today(),clockIn:null,clockOut:null,telatMenit:0,pulangAwalMenit:0,status:"absent"});});};
  const getStatus=w=>{const a=getAtt(w.id);if(!a)return"belum";if(a.status==="absent")return"absent";if(a.clockOut)return"selesai";if(a.clockIn)return"masuk";return"belum";};
  return <div style={{maxWidth:600,margin:"0 auto",padding:16}}>
    <div style={{textAlign:"center",marginBottom:20}}><div style={{fontFamily:F.d,fontSize:48,fontWeight:700,lineHeight:1}}>{time.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"})}</div><div style={{fontFamily:F.d,fontSize:12,color:C.t3,marginTop:2}}>{time.toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div></div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}}>
      <Stat label="Hadir" value={workers.filter(w=>["masuk","selesai"].includes(getStatus(w))).length} color={C.green} bg={C.greenDim}/>
      <Stat label="Absen" value={workers.filter(w=>getStatus(w)==="absent").length} color={C.red} bg={C.redDim}/>
      <Stat label="Belum" value={workers.filter(w=>getStatus(w)==="belum").length} color={C.t3} bg={C.s1}/>
    </div>
    {workers.length===0&&<Empty text="Belum ada tukang terdaftar."/>}
    {workers.map(w=>{const att=getAtt(w.id);const st=getStatus(w);const proj=data.projects.find(p=>p.id===w.proyekAktif);return <div key={w.id} style={{...base.card,padding:14,marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:38,height:38,borderRadius:8,background:st==="masuk"?C.greenDim:st==="selesai"?C.blueDim:st==="absent"?C.redDim:C.s2,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F.d,fontWeight:700,fontSize:14,color:st==="masuk"?C.green:st==="selesai"?C.blue:st==="absent"?C.red:C.accent}}>{w.nama.charAt(0)}</div>
          <div><div style={{fontWeight:600,fontSize:14}}>{w.nama}</div><div style={{display:"flex",gap:5,marginTop:2}}><span style={base.badge(w.level==="mandor"?C.green:w.level==="tukang"?C.accent:C.blue,w.level==="mandor"?C.greenDim:w.level==="tukang"?C.amberDim:C.blueDim)}>{w.level.toUpperCase()}</span>{proj&&<span style={base.badge(C.purple,C.s2)}>{proj.nama}</span>}</div></div>
        </div>
        <div style={{textAlign:"right"}}>
          {st==="masuk"&&<div><div style={{fontSize:10,color:C.t3}}>Masuk</div><div style={{fontFamily:F.d,fontSize:15,color:C.green}}>{fmtTime(att?.clockIn)}</div>{att?.telatMenit>0&&<div style={{fontSize:10,color:C.red}}>Telat {att.telatMenit}m</div>}</div>}
          {st==="selesai"&&<div style={{display:"flex",gap:12}}><div><div style={{fontSize:10,color:C.t3}}>In</div><div style={{fontFamily:F.d,fontSize:13,color:C.green}}>{fmtTime(att?.clockIn)}</div></div><div><div style={{fontSize:10,color:C.t3}}>Out</div><div style={{fontFamily:F.d,fontSize:13,color:C.blue}}>{fmtTime(att?.clockOut)}</div></div></div>}
          {st==="absent"&&<StatusBadge status="absent"/>}
        </div>
      </div>
      <div style={{display:"flex",gap:6}}>
        {st==="belum"&&<><button style={{...base.btn(C.green,"#fff"),flex:1,padding:"10px 0",fontSize:13,borderRadius:8}} onClick={()=>clockIn(w)}>Clock In</button><button style={{...base.btn(C.red,"#fff"),padding:"10px 16px",fontSize:13,borderRadius:8}} onClick={()=>markAbsent(w)}>Absen</button></>}
        {st==="masuk"&&<button style={{...base.btn(C.blue,"#fff"),flex:1,padding:"10px 0",fontSize:13,borderRadius:8}} onClick={()=>clockOut(w)}>Clock Out</button>}
        {st==="selesai"&&<div style={{flex:1,textAlign:"center",padding:"8px 0",color:C.green,fontSize:12,fontWeight:600}}>Selesai hari ini</div>}
        {st==="absent"&&<div style={{flex:1,textAlign:"center",padding:"8px 0",color:C.red,fontSize:12,fontWeight:600}}>Tidak hadir — tidak dibayar hari ini</div>}
      </div>
    </div>;})}
    <button style={{...base.ghost,width:"100%",marginTop:12,textAlign:"center"}} onClick={()=>setShowRules(!showRules)}>{showRules?"Sembunyikan":"Lihat"} House Rules</button>
    {showRules&&<div style={{...base.card,marginTop:8,padding:16}}><div style={{fontSize:11,fontWeight:600,color:C.accent,letterSpacing:.5,marginBottom:10}}>HOUSE RULES</div>{data.houseRules.map((r,i)=><div key={r.id} style={{padding:"10px 0",borderBottom:i<data.houseRules.length-1?`1px solid ${C.b1}`:"none"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:13,fontWeight:500}}>{r.nama}</span><span style={{fontFamily:F.d,fontSize:11,color:C.accent,whiteSpace:"nowrap"}}>{r.denda_per>0?`${fmtRp(r.denda_per)} ${r.satuan}`:r.satuan}</span></div>{r.deskripsi&&<div style={{fontSize:11,color:C.t3,marginTop:2}}>{r.deskripsi}</div>}</div>)}</div>}
    <button style={{...base.ghost,width:"100%",marginTop:12,textAlign:"center"}} onClick={onLogout}>Keluar</button>
  </div>;
}

function ProyekPage({data,update,role}){
  const [selId,setSelId]=useState(null);const [modal,setModal]=useState(null);const [form,setForm]=useState({});const [photos,setPhotos]=useState([]);
  const ff=(k,v)=>setForm(f=>({...f,[k]:v}));
  const validate=()=>{if(form.targetSelesai&&form.mulai&&form.targetSelesai<form.mulai){alert("Target selesai tidak boleh sebelum tanggal mulai");return false;}return true;};
  const addProject=()=>{if(!form.nama||!form.nama.trim()){alert("Nama proyek wajib diisi");return;}if(!validate())return;update(d=>d.projects.push({id:uid(),nama:form.nama.trim(),alamat:form.alamat||"",mulai:form.mulai||today(),targetSelesai:form.targetSelesai||"",phases:[]}));setModal(null);setForm({});};
  const editProject=()=>{if(!validate())return;update(d=>{const p=d.projects.find(x=>x.id===form._editId);if(p){p.nama=form.nama||p.nama;p.alamat=form.alamat??p.alamat;p.mulai=form.mulai||p.mulai;p.targetSelesai=form.targetSelesai||p.targetSelesai;}});setModal(null);setForm({});};
  const deleteProject=pid=>{if(!confirm("Hapus proyek beserta semua data?"))return;update(d=>{d.projects=d.projects.filter(x=>x.id!==pid);});setSelId(null);};
  const addPhase=pid=>{if(!validate())return;update(d=>{const p=d.projects.find(x=>x.id===pid);if(!p.phases)p.phases=[];p.phases.push({id:uid(),nama:form.nama||"",mulai:form.mulai||today(),targetSelesai:form.targetSelesai||"",tasks:[]});});setModal(null);setForm({});};
  const deletePhase=(pid,phid)=>{if(!confirm("Hapus fase?"))return;update(d=>{const p=d.projects.find(x=>x.id===pid);if(p)p.phases=p.phases.filter(x=>x.id!==phid);});};
  const addTask=(pid,phid)=>{if(!validate())return;update(d=>{const ph=d.projects.find(x=>x.id===pid)?.phases?.find(x=>x.id===phid);if(!ph.tasks)ph.tasks=[];ph.tasks.push({id:uid(),nama:form.nama||"",targetM2:parseFloat(form.targetM2)||0,selesaiM2:0,satuan:form.satuan||"m²",mulai:form.mulai||today(),targetSelesai:form.targetSelesai||"",status:"belum",assignedTo:[],logs:[],photos:[]});});setModal(null);setForm({});};
  const deleteTask=(pid,phid,tid)=>{if(!confirm("Hapus tugas?"))return;update(d=>{const ph=d.projects.find(x=>x.id===pid)?.phases?.find(x=>x.id===phid);if(ph)ph.tasks=ph.tasks.filter(x=>x.id!==tid);});};
  const [successMsg,setSuccessMsg]=useState(false);

      <button style={{...base.btn(),width:"100%"}} onClick={add}>Simpan</button>
    </Modal>}

  const add=()=>{
    const unitId=generateUnitId(form.nama||"Item",form.supplier||"",inv);
    update(d=>{if(!d.inventory)d.inventory=[];d.inventory.push({id:uid(),unitId,nama:form.nama||"",supplier:form.supplier||"",jumlah:parseInt(form.jumlah)||1,satuan:form.satuan||"unit",kondisi:form.kondisi||"baik",lokasi:form.lokasi||"",proyekId:form.proyekId||"",catatan:form.catatan||"",photos:[...photos],tanggalMasuk:today()});});
    setModal(null);setForm({});setPhotos([]);
  };
  const edit=()=>{update(d=>{const it=d.inventory.find(x=>x.id===editId);if(it){it.nama=form.nama||it.nama;it.supplier=form.supplier??it.supplier;it.jumlah=parseInt(form.jumlah)||it.jumlah;it.satuan=form.satuan||it.satuan;it.kondisi=form.kondisi||it.kondisi;it.lokasi=form.lokasi??it.lokasi;it.proyekId=form.proyekId!==undefined?form.proyekId:it.proyekId;it.catatan=form.catatan??it.catatan;if(photos.length)it.photos=[...(it.photos||[]),...photos];}});setEditId(null);setForm({});setPhotos([]);};
  const del=id=>{if(!confirm("Hapus?"))return;update(d=>{d.inventory=(d.inventory||[]).filter(x=>x.id!==id);});};
  const kc={baik:C.green,rusak_ringan:C.amber,rusak_berat:C.red,hilang:C.red};const kl={baik:"Baik",rusak_ringan:"Rusak Ringan",rusak_berat:"Rusak Berat",hilang:"Hilang"};
  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h2 style={{fontFamily:F.d,fontSize:18,fontWeight:700,margin:0}}>Inventaris</h2><button style={base.btn()} onClick={()=>{setForm({});setPhotos([]);setModal("new");}}>+ Item</button></div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}><Stat label="Total" value={inv.length} color={C.blue} bg={C.blueDim}/><Stat label="Baik" value={inv.filter(x=>x.kondisi==="baik").length} color={C.green} bg={C.greenDim}/><Stat label="Rusak/hilang" value={inv.filter(x=>x.kondisi!=="baik").length} color={C.red} bg={C.redDim}/></div>
    {inv.length===0?<Empty text="Belum ada inventaris"/>:<div style={{display:"flex",flexDirection:"column",gap:8}}>{inv.map(it=>{const proj=data.projects.find(p=>p.id===it.proyekId);return <div key={it.id} style={{...base.card,padding:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div style={{flex:1}}>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}><span style={{fontWeight:600}}>{it.nama}</span><span style={base.badge(kc[it.kondisi]||C.t3,`${kc[it.kondisi]||C.t3}22`)}>{kl[it.kondisi]||it.kondisi}</span></div>
        <div style={{fontFamily:F.d,fontSize:11,color:C.accent,marginTop:4,wordBreak:"break-all"}}>{it.unitId||"-"}</div>
        <div style={{display:"flex",gap:12,marginTop:4,fontSize:12,color:C.t3,flexWrap:"wrap"}}>
          <span style={{fontFamily:F.d}}>{it.jumlah} {it.satuan}</span>
          {it.supplier&&<span>Supplier: {it.supplier}</span>}
          {it.lokasi&&<span>Lokasi: {it.lokasi}</span>}
          {proj&&<span>Proyek: {proj.nama}</span>}
        </div>
        {it.catatan&&<div style={{fontSize:11,color:C.t3,marginTop:2}}>{it.catatan}</div>}
      </div>
        <div style={{display:"flex",gap:4}}><button style={base.ghost} onClick={()=>{setEditId(it.id);setForm({nama:it.nama,supplier:it.supplier||"",jumlah:String(it.jumlah),satuan:it.satuan,kondisi:it.kondisi,lokasi:it.lokasi||"",proyekId:it.proyekId||"",catatan:it.catatan||""});setPhotos([]);}}>Edit</button><button style={{...base.ghost,color:C.red,borderColor:`${C.red}44`}} onClick={()=>del(it.id)}>×</button></div>
      </div>
      {(it.photos||[]).length>0&&<div style={{marginTop:8}}><PhotoGallery photos={it.photos}/></div>}
    </div>;})}</div>}
    {(modal==="new"||editId)&&<Modal title={editId?"Edit item":"Tambah item"} onClose={()=>{setModal(null);setEditId(null);setForm({});setPhotos([]);}}>
      {!editId&&<div style={{background:C.s2,borderRadius:8,padding:12,marginBottom:14,fontSize:11,color:C.t3}}>Unit ID akan otomatis dibuat: <span style={{color:C.accent,fontFamily:F.d}}>{form.nama||"Nama"}/{String(new Date().getMonth()+1).padStart(2,"0")}/{String(new Date().getFullYear()).slice(2)}/{form.supplier||"NA"}/001</span></div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 14px"}}>
        <Field label="Nama item" span={2}><input style={base.input} autoFocus value={form.nama||""} onChange={e=>ff("nama",e.target.value)} placeholder="cth: Bor Makita HR2470"/></Field>
        <Field label="Supplier"><input style={base.input} value={form.supplier||""} onChange={e=>ff("supplier",e.target.value)} placeholder="cth: Toko Bangunan Jaya"/></Field>
        <Field label="Jumlah"><input style={base.input} type="number" value={form.jumlah||""} onChange={e=>ff("jumlah",e.target.value)}/></Field>
        <Field label="Satuan"><input style={base.input} value={form.satuan||""} onChange={e=>ff("satuan",e.target.value)} placeholder="unit, lembar, batang"/></Field>
        <Field label="Kondisi"><select style={base.select} value={form.kondisi||"baik"} onChange={e=>ff("kondisi",e.target.value)}><option value="baik">Baik</option><option value="rusak_ringan">Rusak Ringan</option><option value="rusak_berat">Rusak Berat</option><option value="hilang">Hilang</option></select></Field>
        <Field label="Lokasi" span={2}><input style={base.input} value={form.lokasi||""} onChange={e=>ff("lokasi",e.target.value)} placeholder="cth: Gudang A, Proyek Lantai 2"/></Field>
        <Field label="Proyek" span={2}><select style={base.select} value={form.proyekId||""} onChange={e=>ff("proyekId",e.target.value)}><option value="">-</option>{data.projects.map(p=><option key={p.id} value={p.id}>{p.nama}</option>)}</select></Field>
        <Field label="Catatan" span={2}><input style={base.input} value={form.catatan||""} onChange={e=>ff("catatan",e.target.value)}/></Field>
        <Field label="Foto" span={2}><PhotoUpload photos={photos} onChange={setPhotos} max={5}/></Field>
      </div>
      <button style={{...base.btn(),width:"100%",marginTop:6}} onClick={editId?edit:add}>{editId?"Simpan":"Tambah"}</button>
    </Modal>}
  </div>;
}

  const w=window.open("","_blank","width=900,height=700");
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title>
<style>
@page{size:A4;margin:15mm 12mm;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Arial,sans-serif;font-size:11px;color:#111;line-height:1.4;padding:15mm 12mm;}
h1{font-size:16px;margin-bottom:2px;}
h2{font-size:12px;font-weight:normal;color:#555;margin-bottom:12px;}
table{width:100%;border-collapse:collapse;margin-top:8px;}
th,td{border:1px solid #999;padding:6px 8px;text-align:left;font-size:10.5px;}
th{background:#e8e8e8;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:0.3px;}
td.num{text-align:right;font-family:'Courier New',monospace;}
td.sign{height:70px;vertical-align:bottom;text-align:center;border:1px solid #999;}
.summary{margin-top:12px;font-size:11px;}
.footer{margin-top:20px;font-size:9px;color:#888;border-top:1px solid #ccc;padding-top:6px;}
@media print{body{padding:0;}}
</style></head><body>${bodyHtml}
<div class="footer">Dicetak dari TMS — Tukang Management System · ${new Date().toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"})}</div>
</body></html>`);
  w.document.close();
  setTimeout(()=>w.print(),500);
}

/* ══════════ EKSPOR ══════════ */
function EksporPage({data}){
  const [from,setFrom]=useState(today());const [to,setTo]=useState(today());
  const inRange=d=>d>=from&&d<=to;

  /* ── CSV exports (unchanged) ── */
  const eksporAbsensiCSV=()=>{const rows=data.attendance.filter(a=>inRange(a.tanggal)).map(a=>{const w=data.workers.find(x=>x.id===a.tukangId);const p=data.projects.find(x=>x.id===a.proyekId);return[a.tanggal,w?.nama||"",w?.level||"",p?.nama||"",a.status==="absent"?"ABSEN":"HADIR",fmtTime(a.clockIn),fmtTime(a.clockOut),a.telatMenit||0,a.pulangAwalMenit||0];});downloadCSV(`absensi_${from}_${to}.csv`,["Tanggal","Nama","Level","Proyek","Status","Clock In","Clock Out","Telat (mnt)","Pulang Awal (mnt)"],rows);};
  const eksporKasbonCSV=()=>{const rows=data.kasbon.filter(k=>inRange(k.tanggal)).map(k=>{const w=data.workers.find(x=>x.id===k.tukangId);return[k.tanggal,w?.nama||"",k.jumlah,k.status,k.catatan||""];});downloadCSV(`kasbon_${from}_${to}.csv`,["Tanggal","Nama","Jumlah","Status","Catatan"],rows);};
  const eksporPelanggaranCSV=()=>{const rows=data.penalties.filter(p=>inRange(p.tanggal)).map(p=>{const w=data.workers.find(x=>x.id===p.tukangId);return[p.tanggal,w?.nama||"",p.aturanNama,p.denda,p.tipe,p.status,p.catatan||""];});downloadCSV(`pelanggaran_${from}_${to}.csv`,["Tanggal","Nama","Aturan","Denda","Tipe","Status","Catatan"],rows);};
  const eksporTukangCSV=()=>{const rows=data.workers.map(w=>{const p=data.projects.find(x=>x.id===w.proyekAktif);return[w.nama,w.level,w.status,w.noKtp||"",w.alamat||"",w.umur||"",fmtRp(w.rateHarian),p?.nama||""];});downloadCSV("tukang.csv",["Nama","Level","Status","KTP","Alamat","Umur","Rate/Hari","Proyek"],rows);};
  const eksporProyekCSV=()=>{const rows=[];data.projects.forEach(p=>{(p.phases||[]).forEach(ph=>{(ph.tasks||[]).forEach(t=>{rows.push([p.nama,ph.nama,t.nama,t.satuan||"m²",t.targetM2,t.selesaiM2||0,t.targetM2>0?Math.round(((t.selesaiM2||0)/t.targetM2)*100):0,t.status,t.mulai||"",t.targetSelesai||""]);});});});downloadCSV("proyek.csv",["Proyek","Fase","Tugas","Satuan","Target","Selesai","Progress %","Status","Mulai","Target Selesai"],rows);};
  const eksporInventarisCSV=()=>{const rows=(data.inventory||[]).map(it=>{const p=data.projects.find(x=>x.id===it.proyekId);return[it.unitId||"",it.nama,it.supplier||"",it.jumlah,it.satuan,it.kondisi,it.lokasi||"",p?.nama||"",it.catatan||"",it.tanggalMasuk||""];});downloadCSV("inventaris.csv",["Unit ID","Nama","Supplier","Jumlah","Satuan","Kondisi","Lokasi","Proyek","Catatan","Tgl Masuk"],rows);};
  const eksporGajiCSV=()=>{const period=getPeriod(from);const adj=data.gajiAdjustments||{};const rows=data.workers.filter(w=>w.status==="AKTIF").map(w=>{const atts=data.attendance.filter(a=>a.tukangId===w.id&&a.status!=="absent"&&new Date(a.tanggal)>=period.start&&new Date(a.tanggal)<=period.end);const hari=atts.length;const kotor=hari*w.rateHarian;const denda=data.penalties.filter(p=>p.tukangId===w.id&&p.status==="approved"&&new Date(p.tanggal)>=period.start&&new Date(p.tanggal)<=period.end).reduce((s,p)=>s+p.denda,0);const kasbon=data.kasbon.filter(k=>k.tukangId===w.id&&k.status==="approved"&&new Date(k.tanggal)>=period.start&&new Date(k.tanggal)<=period.end).reduce((s,k)=>s+k.jumlah,0);const adjKey=`${w.id}_${period.label}`;const wAdj=(adj[adjKey]||[]).reduce((s,a)=>s+a.amount,0);return[w.nama,w.level,hari,kotor,denda,kasbon,wAdj,kotor-denda-kasbon+wAdj];});downloadCSV(`gaji_${period.label}.csv`,["Nama","Level","Hari Kerja","Gaji Kotor","Denda","Kasbon","Penyesuaian","Gaji Bersih"],rows);};

  /* ── PDF exports ── */
  const pdfTable=(title,subtitle,headers,rows)=>{
    const hdr=headers.map(h=>`<th>${h}</th>`).join("");
    const body=rows.map(r=>`<tr>${r.map((c,i)=>`<td${typeof c==="number"?' class="num"':""}>${typeof c==="number"?fmt(c):c}</td>`).join("")}</tr>`).join("");
    openPrintPDF(title,`<h1>${title}</h1><h2>${subtitle}</h2><table><thead><tr>${hdr}</tr></thead><tbody>${body}</tbody></table><div class="summary">${rows.length} baris data</div>`);
  };
  const eksporAbsensiPDF=()=>{const rows=data.attendance.filter(a=>inRange(a.tanggal)).map(a=>{const w=data.workers.find(x=>x.id===a.tukangId);const p=data.projects.find(x=>x.id===a.proyekId);return[a.tanggal,w?.nama||"-",w?.level||"-",p?.nama||"-",a.status==="absent"?"ABSEN":"HADIR",fmtTime(a.clockIn),fmtTime(a.clockOut),a.telatMenit||0];});pdfTable("Laporan Absensi",`${fmtDate(from)} — ${fmtDate(to)}`,["Tanggal","Nama","Level","Proyek","Status","Masuk","Keluar","Telat (mnt)"],rows);};
  const eksporKasbonPDF=()=>{const rows=data.kasbon.filter(k=>inRange(k.tanggal)).map(k=>{const w=data.workers.find(x=>x.id===k.tukangId);return[k.tanggal,w?.nama||"-",fmtRp(k.jumlah),k.status,k.catatan||""];});pdfTable("Laporan Kasbon",`${fmtDate(from)} — ${fmtDate(to)}`,["Tanggal","Nama","Jumlah","Status","Catatan"],rows);};
  const eksporPelanggaranPDF=()=>{const rows=data.penalties.filter(p=>inRange(p.tanggal)).map(p=>{const w=data.workers.find(x=>x.id===p.tukangId);return[p.tanggal,w?.nama||"-",p.aturanNama,fmtRp(p.denda),p.tipe,p.status];});pdfTable("Laporan Pelanggaran",`${fmtDate(from)} — ${fmtDate(to)}`,["Tanggal","Nama","Aturan","Denda","Tipe","Status"],rows);};
  const eksporTukangPDF=()=>{const rows=data.workers.map(w=>{const p=data.projects.find(x=>x.id===w.proyekAktif);return[w.nama,w.level,w.status,w.noKtp||"-",w.alamat||"-",fmtRp(w.rateHarian),p?.nama||"-"];});pdfTable("Database Tukang","Semua data",["Nama","Level","Status","No KTP","Alamat","Rate/Hari","Proyek"],rows);};
  const eksporProyekPDF=()=>{const rows=[];data.projects.forEach(p=>{(p.phases||[]).forEach(ph=>{(ph.tasks||[]).forEach(t=>{rows.push([p.nama,ph.nama,t.nama,t.satuan||"m²",t.targetM2,t.selesaiM2||0,`${t.targetM2>0?Math.round(((t.selesaiM2||0)/t.targetM2)*100):0}%`,t.status]);});});});pdfTable("Laporan Proyek","Semua proyek, fase, tugas",["Proyek","Fase","Tugas","Satuan","Target","Selesai","Progress","Status"],rows);};
  const eksporInventarisPDF=()=>{const rows=(data.inventory||[]).map(it=>{const p=data.projects.find(x=>x.id===it.proyekId);return[it.unitId||"-",it.nama,`${it.jumlah} ${it.satuan}`,it.kondisi,it.lokasi||"-",p?.nama||"-"];});pdfTable("Laporan Inventaris","Semua alat & material",["Unit ID","Nama","Jumlah","Kondisi","Lokasi","Proyek"],rows);};

  /* ── SPECIAL: Gaji PDF — A4 slip format ── */
  const eksporGajiPDF=()=>{
    const adj=data.gajiAdjustments||{};
    const periodLabel=`${fmtDate(from)} — ${fmtDate(to)}`;
    // Only include workers who have attendance in the date range
    const workersWithAtt=data.workers.filter(w=>{
      return data.attendance.some(a=>a.tukangId===w.id&&a.status!=="absent"&&inRange(a.tanggal));
    });
    if(workersWithAtt.length===0){alert("Tidak ada tukang yang hadir pada rentang tanggal ini.");return;}
    const rows=workersWithAtt.map((w,i)=>{
      const atts=data.attendance.filter(a=>a.tukangId===w.id&&a.status!=="absent"&&inRange(a.tanggal));
      const hari=atts.length;const kotor=hari*w.rateHarian;
      const denda=data.penalties.filter(p=>p.tukangId===w.id&&p.status==="approved"&&inRange(p.tanggal)).reduce((s,p)=>s+p.denda,0);
      const kasbon=data.kasbon.filter(k=>k.tukangId===w.id&&k.status==="approved"&&inRange(k.tanggal)).reduce((s,k)=>s+k.jumlah,0);
      const period=getPeriod(from);const adjKey=`${w.id}_${period.label}`;const wAdj=(adj[adjKey]||[]).reduce((s,a)=>s+a.amount,0);
      const bersih=kotor-denda-kasbon+wAdj;
      return `<tr>
        <td style="text-align:center">${i+1}</td>
        <td><strong>${w.nama}</strong></td>
        <td>${w.noKtp||"-"}</td>
        <td style="font-size:9px">${w.alamat||"-"}</td>
        <td style="text-align:center">${hari}</td>
        <td class="num">${fmtRp(denda+kasbon)}</td>
        <td class="num" style="font-weight:600">${fmtRp(bersih)}</td>
        <td class="sign"></td>
      </tr>`;
    }).join("");
    const totalBersih=workersWithAtt.reduce((s,w)=>{const atts=data.attendance.filter(a=>a.tukangId===w.id&&a.status!=="absent"&&inRange(a.tanggal));const hari=atts.length;const kotor=hari*w.rateHarian;const denda=data.penalties.filter(p=>p.tukangId===w.id&&p.status==="approved"&&inRange(p.tanggal)).reduce((s2,p)=>s2+p.denda,0);const kasbon=data.kasbon.filter(k=>k.tukangId===w.id&&k.status==="approved"&&inRange(k.tanggal)).reduce((s2,k)=>s2+k.jumlah,0);const period=getPeriod(from);const adjKey=`${w.id}_${period.label}`;const wAdj=(adj[adjKey]||[]).reduce((s2,a)=>s2+a.amount,0);return s+(kotor-denda-kasbon+wAdj);},0);
    openPrintPDF("Slip Gaji",`
      <h1 style="text-align:center;font-size:18px;margin-bottom:0">SLIP GAJI TUKANG</h1>
      <h2 style="text-align:center;margin-bottom:16px">Periode: ${periodLabel}</h2>
      <table>
        <thead><tr>
          <th style="width:30px;text-align:center">No</th>
          <th style="width:140px">Nama</th>
          <th style="width:120px">No KTP</th>
          <th>Alamat</th>
          <th style="width:50px;text-align:center">Hari Kerja</th>
          <th style="width:90px;text-align:right">Potongan</th>
          <th style="width:100px;text-align:right">Total Gaji</th>
          <th style="width:100px;text-align:center">Tanda Tangan</th>
        </tr></thead>
        <tbody>${rows}
          <tr style="font-weight:700;background:#f0f0f0">
            <td colspan="6" style="text-align:right;padding-right:12px">TOTAL</td>
            <td class="num">${fmtRp(totalBersih)}</td>
            <td></td>
          </tr>
        </tbody>
      </table>
      <div style="margin-top:24px;display:flex;justify-content:space-between">
        <div style="text-align:center;width:200px">
          <div style="margin-bottom:60px">Diserahkan oleh,</div>
          <div style="border-top:1px solid #333;padding-top:4px">Manajer Proyek</div>
        </div>
        <div style="text-align:center;width:200px">
          <div style="margin-bottom:60px">Diketahui oleh,</div>
          <div style="border-top:1px solid #333;padding-top:4px">Pemilik</div>
        </div>
      </div>
    `);
  };

  const items=[
    {label:"Absensi",desc:"Kehadiran",csv:eksporAbsensiCSV,pdf:eksporAbsensiPDF,dated:true},
    {label:"Kasbon",desc:"Data kasbon",csv:eksporKasbonCSV,pdf:eksporKasbonPDF,dated:true},
    {label:"Pelanggaran",desc:"House rule violations",csv:eksporPelanggaranCSV,pdf:eksporPelanggaranPDF,dated:true},
    {label:"Tukang",desc:"Database tukang",csv:eksporTukangCSV,pdf:eksporTukangPDF},
    {label:"Proyek",desc:"Proyek, fase, tugas",csv:eksporProyekCSV,pdf:eksporProyekPDF},
    {label:"Inventaris",desc:"Alat & material + Unit ID",csv:eksporInventarisCSV,pdf:eksporInventarisPDF},
    {label:"Gaji (CSV)",desc:"Data gaji mentah",csv:eksporGajiCSV,dated:true},
    {label:"Slip Gaji (PDF)",desc:"Format A4 siap cetak — hanya tukang yang hadir",pdf:eksporGajiPDF,dated:true,highlight:true},
  ];
  return <div>
    <h2 style={{fontFamily:F.d,fontSize:18,fontWeight:700,margin:"0 0 16px"}}>Ekspor Data</h2>
    <div style={{...base.card,marginBottom:20}}>
      <div style={{fontSize:11,fontWeight:600,color:C.t3,letterSpacing:.5,marginBottom:12}}>RENTANG TANGGAL</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}><DateInput label="Dari" value={from} onChange={setFrom}/><DateInput label="Sampai" value={to} onChange={setTo} min={from}/></div>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {items.map(it=><div key={it.label} style={{...base.card,padding:14,display:"flex",justifyContent:"space-between",alignItems:"center",borderLeft:it.highlight?`3px solid ${C.accent}`:"none"}}>
        <div><div style={{fontWeight:600}}>{it.label}</div><div style={{fontSize:11,color:C.t3,marginTop:2}}>{it.desc}{it.dated?` (${fmtDateShort(from)} — ${fmtDateShort(to)})`:""}</div></div>
        <div style={{display:"flex",gap:6}}>
          {it.csv&&<button style={base.btn()} onClick={it.csv}>CSV</button>}
          {it.pdf&&<button style={{...base.btn(C.blue,"#fff")}} onClick={it.pdf}>PDF</button>}
        </div>
      </div>)}
    </div>
  </div>;
}

/* ══════════ APPROVAL (manager - kasbon & pelanggaran only) ══════════ */
function ApprovalPage({data,update}){
  const approveKasbon=id=>update(d=>{const k=d.kasbon.find(x=>x.id===id);if(k)k.status="approved";});
  const rejectKasbon=id=>update(d=>{const k=d.kasbon.find(x=>x.id===id);if(k)k.status="rejected";});
  const approvePenalty=id=>update(d=>{const p=d.penalties.find(x=>x.id===id);if(p)p.status="approved";});
  const rejectPenalty=id=>update(d=>{const p=d.penalties.find(x=>x.id===id);if(p)p.status="rejected";});

  const pendingKasbon=data.kasbon.filter(k=>k.status==="pending");
  const pendingPenalties=data.penalties.filter(p=>p.status==="pending");
  const totalPending=pendingKasbon.length+pendingPenalties.length;

  return <div>
    <h2 style={{fontFamily:F.d,fontSize:18,fontWeight:700,margin:"0 0 16px"}}>Approval</h2>
    <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12,marginBottom:20}}>
      <Stat label="Kasbon" value={pendingKasbon.length} color={C.amber} bg={C.amberDim}/>
      <Stat label="Pelanggaran" value={pendingPenalties.length} color={C.red} bg={C.redDim}/>
    </div>
    {totalPending===0&&<Empty text="Tidak ada yang perlu di-approve saat ini."/>}

    {pendingKasbon.length>0&&<div style={{marginBottom:20}}>
      <div style={{fontSize:12,fontWeight:600,color:C.amber,letterSpacing:.5,marginBottom:10}}>KASBON ({pendingKasbon.length})</div>
      {pendingKasbon.map(k=>{const w=data.workers.find(x=>x.id===k.tukangId);return <div key={k.id} style={{...base.card,padding:14,marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontWeight:500}}>{w?.nama||"-"}</div><div style={{fontSize:11,color:C.t3}}>{fmtDate(k.tanggal)} {k.catatan?`· ${k.catatan}`:""}</div></div>
        <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontFamily:F.d,fontWeight:700,fontSize:16}}>{fmtRp(k.jumlah)}</span>
          <button style={{...base.btn(C.green,"#fff"),padding:"6px 16px"}} onClick={()=>approveKasbon(k.id)}>OK</button>
          <button style={{...base.btn(C.red,"#fff"),padding:"6px 16px"}} onClick={()=>rejectKasbon(k.id)}>×</button>
        </div>
      </div>;})}
    </div>}

    {pendingPenalties.length>0&&<div>
      <div style={{fontSize:12,fontWeight:600,color:C.red,letterSpacing:.5,marginBottom:10}}>PELANGGARAN ({pendingPenalties.length})</div>
      {pendingPenalties.map(p=>{const w=data.workers.find(x=>x.id===p.tukangId);return <div key={p.id} style={{...base.card,padding:14,marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontWeight:500}}>{w?.nama||"-"}</div><div style={{fontSize:12,color:C.t2}}>{p.aturanNama}</div><div style={{fontSize:11,color:C.t3}}>{fmtDate(p.tanggal)} {p.catatan?`· ${p.catatan}`:""}</div></div>
        <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontFamily:F.d,fontWeight:700,color:C.red}}>{fmtRp(p.denda)}</span>
          <button style={{...base.btn(C.green,"#fff"),padding:"6px 16px"}} onClick={()=>approvePenalty(p.id)}>OK</button>
          <button style={{...base.btn(C.red,"#fff"),padding:"6px 16px"}} onClick={()=>rejectPenalty(p.id)}>×</button>
        </div>
      </div>;})}
    </div>}
  </div>;
}

/* ══════════ GAJI — with manual adjustment ══════════ */
function GajiPage({data,update}){
  const defP=getPeriod(today());const defFrom=defP.start.toISOString().split("T")[0];const defTo=defP.end.toISOString().split("T")[0];
  const [gajiFrom,setGajiFrom]=useState(defFrom);const [gajiTo,setGajiTo]=useState(defTo);
  const [modal,setModal]=useState(null);const [form,setForm]=useState({});
  const ff=(k,v)=>setForm(f=>({...f,[k]:v}));
  const active=data.workers.filter(w=>w.status==="AKTIF");
  const adjustments=data.gajiAdjustments||{};
  const periodLabel=`${fmtDate(gajiFrom)} — ${fmtDate(gajiTo)}`;
  const inGaji=d=>d>=gajiFrom&&d<=gajiTo;

  const changeRate=(wid)=>{const nr=parseInt(form.newRate)||0;if(nr<=0)return;update(d=>{const w=d.workers.find(x=>x.id===wid);if(w)w.rateHarian=nr;});setModal(null);setForm({});};
  const addAdjustment=(wid)=>{const amt=parseInt(form.adjAmount)||0;if(amt===0)return;update(d=>{if(!d.gajiAdjustments)d.gajiAdjustments={};const key=`${wid}_${periodLabel}`;if(!d.gajiAdjustments[key])d.gajiAdjustments[key]=[];d.gajiAdjustments[key].push({id:uid(),amount:amt,note:form.adjNote||"",date:today()});});setModal(null);setForm({});};

  const rows=active.map(w=>{
    const atts=data.attendance.filter(a=>a.tukangId===w.id&&a.status!=="absent"&&inGaji(a.tanggal));
    const hari=atts.length;const kotor=hari*w.rateHarian;
    const denda=data.penalties.filter(p=>p.tukangId===w.id&&p.status==="approved"&&inGaji(p.tanggal)).reduce((s,p)=>s+p.denda,0);
    const kasbon=data.kasbon.filter(k=>k.tukangId===w.id&&k.status==="approved"&&inGaji(k.tanggal)).reduce((s,k)=>s+k.jumlah,0);
    const adjKey=`${w.id}_${periodLabel}`;const wAdj=adjustments[adjKey]||[];const adj=wAdj.reduce((s,a)=>s+a.amount,0);
    return{w,hari,kotor,denda,kasbon,adj,wAdj,bersih:kotor-denda-kasbon+adj};
  });
  const totals=rows.reduce((s,r)=>({kotor:s.kotor+r.kotor,denda:s.denda+r.denda,kasbon:s.kasbon+r.kasbon,adj:s.adj+r.adj,bersih:s.bersih+r.bersih}),{kotor:0,denda:0,kasbon:0,adj:0,bersih:0});

  return <div>
    <h2 style={{fontFamily:F.d,fontSize:18,fontWeight:700,margin:"0 0 16px"}}>Gaji</h2>
    <div style={{...base.card,marginBottom:16}}>
      <div style={{fontSize:11,fontWeight:600,color:C.t3,letterSpacing:.5,marginBottom:10}}>PERIODE GAJI</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:10}}><DateInput label="Dari" value={gajiFrom} onChange={setGajiFrom}/><DateInput label="Sampai" value={gajiTo} onChange={v=>setGajiTo(v<gajiFrom?gajiFrom:v)} min={gajiFrom}/></div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}><button style={base.ghost} onClick={()=>{const p=getPeriod(today());setGajiFrom(p.start.toISOString().split("T")[0]);setGajiTo(p.end.toISOString().split("T")[0]);}}>Periode saat ini</button><button style={base.ghost} onClick={()=>{const d=new Date(),y=d.getFullYear(),m=d.getMonth();setGajiFrom(`${y}-${String(m+1).padStart(2,"0")}-01`);setGajiTo(`${y}-${String(m+1).padStart(2,"0")}-${new Date(y,m+1,0).getDate()}`);}}>Bulan ini</button></div>
    </div>
    <div style={{fontSize:12,color:C.t2,marginBottom:12}}>Periode: <span style={{fontFamily:F.d,color:C.accent}}>{periodLabel}</span></div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
      <Stat label="Kotor" value={fmtRp(totals.kotor)} color={C.blue} bg={C.blueDim}/>
      <Stat label="Potongan" value={fmtRp(totals.denda+totals.kasbon)} color={C.red} bg={C.redDim}/>
      <Stat label="Penyesuaian" value={fmtRp(totals.adj)} color={totals.adj>=0?C.green:C.red} bg={totals.adj>=0?C.greenDim:C.redDim}/>
      <Stat label="Bersih" value={fmtRp(totals.bersih)} color={C.green} bg={C.greenDim}/>
    </div>
    {active.length===0?<Empty text="Tidak ada tukang aktif"/>:<div style={{display:"flex",flexDirection:"column",gap:8}}>
      {rows.map(r=>{return <div key={r.w.id} style={{...base.card,padding:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontWeight:600}}>{r.w.nama}</div><div style={{fontSize:11,color:C.t3}}>{r.w.level} · {r.hari} hari · {fmtRp(r.w.rateHarian)}/hari</div></div>
          <div style={{fontFamily:F.d,fontSize:22,fontWeight:700,color:r.bersih>=0?C.green:C.red}}>{fmtRp(r.bersih)}</div>
        </div>
        {/* breakdown */}
        <div style={{display:"flex",gap:12,marginTop:8,fontSize:12,flexWrap:"wrap"}}>
          <span style={{color:C.t3}}>Kotor: <span style={{fontFamily:F.d,color:C.t2}}>{fmtRp(r.kotor)}</span></span>
          {r.denda>0&&<span style={{color:C.t3}}>Denda: <span style={{fontFamily:F.d,color:C.red}}>-{fmtRp(r.denda)}</span></span>}
          {r.kasbon>0&&<span style={{color:C.t3}}>Kasbon: <span style={{fontFamily:F.d,color:C.amber}}>-{fmtRp(r.kasbon)}</span></span>}
          {r.adj!==0&&<span style={{color:C.t3}}>Penyesuaian: <span style={{fontFamily:F.d,color:r.adj>0?C.green:C.red}}>{r.adj>0?"+":""}{fmtRp(r.adj)}</span></span>}
        </div>
        {/* manual adjustments list */}
        {r.wAdj.length>0&&<div style={{marginTop:8,borderTop:`1px solid ${C.b1}`,paddingTop:8}}>{r.wAdj.map(a=><div key={a.id} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.t3,marginBottom:2}}><span>{a.note||"Penyesuaian"}</span><span style={{fontFamily:F.d,color:a.amount>0?C.green:C.red}}>{a.amount>0?"+":""}{fmtRp(a.amount)}</span></div>)}</div>}
        {/* action buttons */}
        <div style={{display:"flex",gap:6,marginTop:10}}>
          <button style={{...base.ghost,fontSize:11}} onClick={()=>{setForm({_wid:r.w.id,_wname:r.w.nama,newRate:String(r.w.rateHarian)});setModal("changeRate");}}>Ubah rate harian</button>
          <button style={{...base.ghost,fontSize:11}} onClick={()=>{setForm({_wid:r.w.id,_wname:r.w.nama,adjAmount:"",adjNote:""});setModal("addAdj");}}>+ Penyesuaian</button>
        </div>
      </div>;})}
    </div>}

    {modal==="changeRate"&&<Modal title={`Ubah rate: ${form._wname}`} onClose={()=>setModal(null)} width={380}>
      <Field label="Rate harian baru (Rp)"><input style={{...base.input,fontFamily:F.d,fontSize:18,textAlign:"center"}} type="number" autoFocus value={form.newRate||""} onChange={e=>ff("newRate",e.target.value)}/></Field>
      <div style={{display:"flex",gap:6,marginBottom:12}}>{[120000,140000,160000,180000,200000].map(v=><button key={v} style={{...base.ghost,flex:1,textAlign:"center",fontSize:10,padding:"6px 2px",background:parseInt(form.newRate)===v?C.amberDim:"transparent",color:parseInt(form.newRate)===v?C.accent:C.t3}} onClick={()=>ff("newRate",String(v))}>{fmt(v)}</button>)}</div>
      <div style={{fontSize:11,color:C.amber,marginBottom:8}}>Perubahan rate berlaku untuk perhitungan gaji selanjutnya.</div>
      <button style={{...base.btn(),width:"100%"}} onClick={()=>changeRate(form._wid)}>Simpan rate baru</button>
    </Modal>}
    {modal==="addAdj"&&<Modal title={`Penyesuaian: ${form._wname}`} onClose={()=>setModal(null)} width={380}>
      <Field label="Jumlah (positif = tambah, negatif = kurang)"><input style={{...base.input,fontFamily:F.d,fontSize:18,textAlign:"center"}} type="number" autoFocus value={form.adjAmount||""} onChange={e=>ff("adjAmount",e.target.value)} placeholder="cth: 50000 atau -30000"/></Field>
      <Field label="Catatan"><input style={base.input} value={form.adjNote||""} onChange={e=>ff("adjNote",e.target.value)} placeholder="cth: Bonus lembur, potongan kerusakan, dll"/></Field>
      <button style={{...base.btn(),width:"100%"}} onClick={()=>addAdjustment(form._wid)}>Tambah penyesuaian</button>
    </Modal>}
  </div>;
}

function AturanPage({data,update}){const [editId,setEditId]=useState(null);const [form,setForm]=useState({});const ff=(k,v)=>setForm(f=>({...f,[k]:v}));
  const saveRule=id=>{update(d=>{const r=d.houseRules.find(x=>x.id===id);if(r){r.nama=form.nama||r.nama;r.denda_per=parseInt(form.denda_per)??r.denda_per;r.satuan=form.satuan||r.satuan;r.deskripsi=form.deskripsi??r.deskripsi;}});setEditId(null);};
  const addRule=()=>{update(d=>d.houseRules.push({id:uid(),nama:form.newN||"",denda_per:parseInt(form.newD)||0,satuan:form.newS||"per kejadian",tipe:"manual",deskripsi:form.newDesc||""}));setForm({});};
  const delRule=id=>{update(d=>{d.houseRules=d.houseRules.filter(x=>x.id!==id);});};
  const savePins=()=>{update(d=>{if(form.mp)d.managerPin=String(form.mp);if(form.ap)d.adminPin=String(form.ap);if(form.bp)d.absenPin=String(form.bp);});setForm({});alert("PIN diperbarui");};
  return <div>
    <h2 style={{fontFamily:F.d,fontSize:18,fontWeight:700,margin:"0 0 16px"}}>Pengaturan</h2>
    <div style={{fontFamily:F.d,fontSize:12,fontWeight:600,color:C.t3,marginBottom:8,letterSpacing:.5}}>KELOLA HOUSE RULES</div>
    {data.houseRules.map(r=><div key={r.id} style={{...base.card,padding:14,marginBottom:6}}>
      {editId===r.id?<div><div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}><input style={{...base.input,flex:1,minWidth:180}} value={form.nama??r.nama} onChange={e=>ff("nama",e.target.value)}/><input style={{...base.input,width:100}} type="number" value={form.denda_per??r.denda_per} onChange={e=>ff("denda_per",e.target.value)}/><input style={{...base.input,width:120}} value={form.satuan??r.satuan} onChange={e=>ff("satuan",e.target.value)}/></div><input style={{...base.input,marginBottom:8}} placeholder="Deskripsi" value={form.deskripsi??r.deskripsi??""} onChange={e=>ff("deskripsi",e.target.value)}/><div style={{display:"flex",gap:6}}><button style={base.btn()} onClick={()=>saveRule(r.id)}>Simpan</button><button style={base.ghost} onClick={()=>setEditId(null)}>Batal</button></div></div>
      :<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}><span style={{fontWeight:500}}>{r.nama}</span><span style={{fontFamily:F.d,fontSize:11,color:C.accent}}>{r.denda_per>0?`${fmtRp(r.denda_per)} ${r.satuan}`:r.satuan}</span><span style={base.badge(r.tipe==="auto"?C.blue:C.purple,C.s2)}>{r.tipe}</span></div>{r.deskripsi&&<div style={{fontSize:11,color:C.t3,marginTop:3}}>{r.deskripsi}</div>}</div><div style={{display:"flex",gap:4}}><button style={base.ghost} onClick={()=>{setEditId(r.id);setForm({});}}>Edit</button>{r.tipe!=="auto"&&<button style={{...base.ghost,color:C.red,borderColor:`${C.red}44`}} onClick={()=>delRule(r.id)}>×</button>}</div></div>}
    </div>)}
    <div style={{...base.card,marginTop:12}}>
      <Field label="Nama aturan"><input style={base.input} placeholder="cth: Buang sampah sembarangan" value={form.newN||""} onChange={e=>ff("newN",e.target.value)}/></Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <Field label="Denda (Rp)"><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{color:C.accent,fontFamily:F.d,fontSize:13,flexShrink:0}}>Rp</span><input style={{...base.input,fontFamily:F.d}} type="number" placeholder="50000" value={form.newD||""} onChange={e=>ff("newD",e.target.value)}/></div></Field>
        <Field label="Satuan denda"><select style={base.select} value={form.newS||"per kejadian"} onChange={e=>ff("newS",e.target.value)}><option value="per kejadian">per kejadian</option><option value="per orang">per orang</option><option value="per hari">per hari</option><option value="per menit">per menit</option><option value="sesuai biaya">sesuai biaya</option></select></Field>
      </div>
      <Field label="Deskripsi"><input style={base.input} placeholder="Penjelasan aturan untuk tukang" value={form.newDesc||""} onChange={e=>ff("newDesc",e.target.value)}/></Field>
      <button style={base.btn()} onClick={addRule}>+ Tambah aturan</button>
    </div>
    <div style={{fontFamily:F.d,fontSize:12,fontWeight:600,color:C.t3,margin:"24px 0 8px",letterSpacing:.5}}>PIN AKSES</div>
    <div style={base.card}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14}}><Field label="Manajer"><input style={base.input} value={form.mp||data.managerPin} onChange={e=>ff("mp",e.target.value.replace(/\D/g,""))} maxLength={6}/></Field><Field label="Admin"><input style={base.input} value={form.ap||data.adminPin} onChange={e=>ff("ap",e.target.value.replace(/\D/g,""))} maxLength={6}/></Field><Field label="Absensi"><input style={base.input} value={form.bp||data.absenPin||"0000"} onChange={e=>ff("bp",e.target.value.replace(/\D/g,""))} maxLength={6}/></Field></div><button style={{...base.btn(),marginTop:4}} onClick={savePins}>Simpan PIN</button></div>
    <div style={{fontFamily:F.d,fontSize:12,fontWeight:600,color:C.t3,margin:"24px 0 8px",letterSpacing:.5}}>ZONA BAHAYA</div>
    <div style={{...base.card,borderLeft:`3px solid ${C.red}`}}><p style={{fontSize:12,color:C.t3,margin:"0 0 10px"}}>Hapus semua data</p><button style={base.btn(C.red,"#fff")} onClick={async()=>{if(confirm("Yakin?")){try{await API.saveData({...EMPTY});}catch{}location.reload();}}}>Reset</button></div>
  </div>;
}

/* ══════════ CONFIG PAGE ══════════ */
function ConfigPage({onSave}) {
  const [url, setUrl] = useState(API.getUrl());
  const [status, setStatus] = useState("");
  const [testing, setTesting] = useState(false);
  const test = async () => { setTesting(true); setStatus("Testing..."); const r = await API.ping(); setStatus(r.ok ? "✓ Terhubung ke Google Sheets!" : "✗ " + r.msg); setTesting(false); };
  const save = () => { API.setUrl(url.trim()); if (onSave) onSave(); };
  return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:20,background:C.bg,fontFamily:F.b}}>
    <div style={{maxWidth:480,width:"100%"}}>
      <div style={{textAlign:"center",marginBottom:40}}><div style={{fontFamily:F.d,fontSize:36,fontWeight:700,color:C.accent}}>TMS</div><div style={{color:C.t3,fontSize:13,marginTop:6}}>Tukang Management System</div><div style={{color:C.t3,fontSize:11,marginTop:2}}>construction.bakoelkoffie.com</div></div>
      <div style={base.card}>
        <div style={{fontSize:13,color:C.t2,marginBottom:16}}>Masukkan URL Google Apps Script Web App untuk menghubungkan ke database Google Sheets dan Google Drive.</div>
        <div style={{marginBottom:14}}><label style={{display:"block",fontSize:11.5,color:C.t3,marginBottom:5,fontWeight:500}}>Apps Script Web App URL</label><input style={base.input} value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://script.google.com/macros/s/.../exec"/></div>
        {url.trim() && <button style={{...base.ghost,width:"100%",marginBottom:8,textAlign:"center"}} onClick={test} disabled={testing}>{testing ? "Testing..." : "Test Koneksi"}</button>}
        {status && <div style={{textAlign:"center",fontSize:12,marginBottom:12,color:status.startsWith("✓")?C.green:status.startsWith("✗")?C.red:C.t3}}>{status}</div>}
        <button style={{...base.btn(),width:"100%",padding:14}} onClick={save}>{url.trim() ? "Simpan & Mulai" : "Lewati (Mode Lokal)"}</button>
        {!url.trim() && <div style={{fontSize:11,color:C.t3,textAlign:"center",marginTop:10}}>Mode lokal menyimpan data di browser saja. Data tidak tersimpan ke Google Sheets.</div>}
      </div>
    </div>
  </div>;
}

function RootApp() {
  const [configured, setConfigured] = useState(API.isConfigured() || localStorage.getItem("tms_skip_config") === "1");
  if (!configured) return <ConfigPage onSave={() => { localStorage.setItem("tms_skip_config", "1"); setConfigured(true); }} />;
  return <App />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<RootApp />);
  </script>
